l_simp_chinese:
 minghm_address_military_crisis_decision:0 "处置军政失衡"
 minghm_address_military_crisis_decision_desc:0 "在战争或军权失控时，以一次有限的政治博弈处理军政关系。它不会生成新军队、兵种或地区叛军。"
 minghm_crisis.2000.t:0 "军政失衡"
 minghm_crisis.2000.desc:0 "军中要求超出旧有秩序的处置权。危机由军事自主、既有压力与国家整合能力共同构成。\n\n#V 朝廷响应：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_response_force').GetValue|V0]#!\n#V 危机力量：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_crisis_force').GetValue|V0]#!"
 minghm_crisis.2000.a:0 "以官僚程序整合军令"
 minghm_crisis.2000.a.tt:0 "响应增加，但公开承诺会扩大政治投入。"
 minghm_crisis.2000.b:0 "耗费 25 皇权，直接裁断"
 minghm_crisis.2000.b.tt:0 "迅速增强响应，但提高抵制并削弱精英协调。"
 minghm_crisis.2000.c:0 "暂不介入"
 minghm_crisis.2000.c.tt:0 "解除危机槽，不改变长期力量。"
 minghm_crisis.2001.t:0 "军令如何落地"
 minghm_crisis.2001.desc:0 "第一轮处置已使矛盾公开化。继续行政整合需要牺牲短期国家能力；让步则能换来眼前稳定，却会抬升军权自主。"
 minghm_crisis.2001.a:0 "坚持中央协调，承受行政消耗"
 minghm_crisis.2001.a.tt:0 "响应增加，国家能力暂时下降。"
 minghm_crisis.2001.b:0 "接受军中条件，换取暂时服从"
 minghm_crisis.2001.b.tt:0 "危机力量下降，但军事自主上升。"
 minghm_crisis.2002.t:0 "军政危机的余波"
 minghm_crisis.2002.desc:0 "对抗结束。最终差值由已投入的朝廷响应、危机力量和有限随机组成。"
 minghm_crisis.2002.a:0 "军令重归中央"
 minghm_crisis.2002.b:0 "以妥协维持秩序"
 minghm_crisis.2002.c:0 "危机暂被压下，军权仍在增长"
 minghm_crisis.2002.d:0 "朝廷威令受挫"
