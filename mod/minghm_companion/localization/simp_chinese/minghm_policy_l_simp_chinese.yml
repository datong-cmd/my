l_simp_chinese:
 minghm_launch_bureaucratic_reform_decision:0 "推行官僚考成重整"
 minghm_launch_bureaucratic_reform_decision_desc:0 "以全国力量对比推动一次两年期的考成重整。它不会改写科举、官职或品级，只会检验现有朝廷能否把诏令变为执行。"
 minghm_policy.1000.t:0 "考成重整之议"
 minghm_policy.1000.desc:0 "朝廷可以以公开廷议凝聚名分，也可以先协调执行链。现有内阁关系、朋党影响和八项全国力量已被折算进本次提案。\n\n#V 当前执行能力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_capacity').GetValue|V0]#!\n#V 当前朝堂支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_support').GetValue|V0]#!\n#V 当前既得利益阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_resistance').GetValue|V0]#!\n#V 当前改革深度：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_radicality').GetValue|V0]#!"
 minghm_policy.1000.a:0 "公开廷议，争取朝堂名分"
 minghm_policy.1000.a.tt:0 "支持增加，但公开反对也会被组织起来。"
 minghm_policy.1000.b:0 "先协调承办官署，降低改革深度"
 minghm_policy.1000.b.tt:0 "执行能力上升，改革深度下降。"
 minghm_policy.1000.c:0 "暂缓此议"
 minghm_policy.1000.c.tt:0 "不改变长期力量，解除本次前台锁。"
 minghm_policy.1001.t:0 "诏令的裁决"
 minghm_policy.1001.desc:0 "廷议已给出条件。妥协能换取较稳定的执行；强推可以迅速开局，却会留下精英分裂和抵制。\n\n#V 执行能力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_capacity').GetValue|V0]#!\n#V 朝堂支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_support').GetValue|V0]#!\n#V 既得利益阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_resistance').GetValue|V0]#!\n#V 改革深度：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_radicality').GetValue|V0]#!"
 minghm_policy.1001.a:0 "接受妥协条款，付诸执行"
 minghm_policy.1001.a.tt:0 "支持增加，改革深度下降；两年后按执行得分结算。"
 minghm_policy.1001.b:0 "耗费 25 皇权，强行颁行"
 minghm_policy.1001.b.tt:0 "支持暂时增加，但抵制和精英分裂也会增加。"
 minghm_policy.1001.c:0 "撤回诏令"
 minghm_policy.1001.c.tt:0 "解除本次前台锁，不改变长期力量。"
 minghm_policy.1002.t:0 "考成重整的结算"
 minghm_policy.1002.desc:0 "两年执行期结束。结果由事前锁定的执行能力、朝堂支持、既得利益阻力与有限随机共同决定。\n\n#V 执行得分：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_result').GetValue|V0]#!（执行能力 + 支持的一半 − 阻力 + 0—10 随机）"
 minghm_policy.1002.a:0 "承认新制已充分落实"
 minghm_policy.1002.a.tt:0 "国家能力和改革势头上升，守成力量下降。"
 minghm_policy.1002.b:0 "接受折衷落实"
 minghm_policy.1002.b.tt:0 "获得有限制度收益。"
 minghm_policy.1002.c:0 "承认纸面通过、执行走样"
 minghm_policy.1002.c.tt:0 "改革受挫，危机和守成力量上升。"
 minghm_policy.1002.d:0 "面对反噬，重整朝局"
 minghm_policy.1002.d.tt:0 "国家能力和改革势头下降，危机和守成力量上升。"
 minghm_launch_public_consultation_decision:0 "建立民生协商与动员程序"
 minghm_launch_public_consultation_decision_desc:0 "以两年期国家层协商试验组织既有民众动员、改革势头与朝廷能力。它不模拟人口、行业、市场或地方代表。"
 minghm_policy.1100.t:0 "民生协商之议"
 minghm_policy.1100.desc:0 "社会要求被纳入国家决策，既可能形成新的改革支持，也可能使对立更易组织。当前数值只表示全国力量关系，不代表任何具体群体或地区。\n\n#V 执行能力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_capacity').GetValue|V0]#!\n#V 动员支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_support').GetValue|V0]#!\n#V 守成阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_resistance').GetValue|V0]#!"
 minghm_policy.1100.a:0 "设立公开陈情与朝议程序"
 minghm_policy.1100.a.tt:0 "支持增加，但守成阻力也会被公开组织。"
 minghm_policy.1100.b:0 "以有限请愿纳入既有程序"
 minghm_policy.1100.b.tt:0 "执行能力上升，改革深度下降，商业政治影响小幅上升。"
 minghm_policy.1100.c:0 "暂缓此议"
 minghm_policy.1101.t:0 "协商的边界"
 minghm_policy.1101.desc:0 "制度化协商可以收束冲突，也可以扩大参与。前者更容易执行；后者更能改变力量对比，亦会提高既得利益的抵制。"
 minghm_policy.1101.a:0 "限定议题，先确保可执行"
 minghm_policy.1101.a.tt:0 "支持增加，改革深度下降；两年后结算。"
 minghm_policy.1101.b:0 "扩大公开动员"
 minghm_policy.1101.b.tt:0 "要求民众动员至少 35；支持和民众动员上升，阻力也上升。"
 minghm_policy.1101.c:0 "停止筹备"
 minghm_policy.1102.t:0 "民生协商的结算"
 minghm_policy.1102.desc:0 "两年执行期结束。结果由国家执行能力、动员支持、守成阻力与有限随机共同决定；没有地区、人口或产出被单独计算。"
 minghm_policy.1102.a:0 "形成新的协商能力"
 minghm_policy.1102.b:0 "形成有限参与渠道"
 minghm_policy.1102.c:0 "程序被守成力量架空"
 minghm_policy.1102.d:0 "动员反噬为新的危机"
 minghm_launch_commercial_participation_decision:0 "规范承办组织的政治参与"
 minghm_launch_commercial_participation_decision_desc:0 "承办组织的影响上升后，可以试图把它纳入国家协调。这里的“商业”只表示政治议价能力，不建立市场、金钱、商品或生产系统。"
 minghm_policy.1200.t:0 "承办组织的参与之议"
 minghm_policy.1200.desc:0 "持续的技术与行政协作让承办组织获得了稳定影响。朝廷可以将其纳入可监督的程序，也可以只给出有限许可。\n\n#V 执行能力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_capacity').GetValue|V0]#!\n#V 承办支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_support').GetValue|V0]#!\n#V 政治阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_resistance').GetValue|V0]#!"
 minghm_policy.1200.a:0 "承认有条件的协作席位"
 minghm_policy.1200.a.tt:0 "支持与商业影响上升，守成阻力也会增加。"
 minghm_policy.1200.b:0 "仅以官署许可纳入"
 minghm_policy.1200.b.tt:0 "执行能力上升、改革深度下降，商业影响仅小幅上升。"
 minghm_policy.1200.c:0 "暂不处理"
 minghm_policy.1201.t:0 "参与的制度边界"
 minghm_policy.1201.desc:0 "任何稳定参与都会要求规则和保证。程序化授权更能保留协调；皇权许可能够迅速推进，却会加重精英间的紧张。"
 minghm_policy.1201.a:0 "制定可复核的成例"
 minghm_policy.1201.a.tt:0 "支持与阻力都小幅增加；两年后结算。"
 minghm_policy.1201.b:0 "耗费 25 皇权，特许推进"
 minghm_policy.1201.b.tt:0 "支持短期上升，但阻力与精英分裂增加。"
 minghm_policy.1201.c:0 "终止筹备"
 minghm_policy.1202.t:0 "承办参与的结算"
 minghm_policy.1202.desc:0 "两年试行结束。结算只衡量国家协调、承办支持、政治阻力与有限随机；它不计算贸易额、产量、地区或财富。"
 minghm_policy.1202.a:0 "形成受约束的协作秩序"
 minghm_policy.1202.b:0 "形成有限的政治参与"
 minghm_policy.1202.c:0 "旧势力重新夺回定义权"
 minghm_policy.1202.d:0 "参与反而加深失衡"
 minghm_launch_military_reorganization_decision:0 "推行军制重整"
 minghm_launch_military_reorganization_decision_desc:0 "把军令、训练与行政协调重新纳入两年期制度博弈。它不会修改军队、兵种、封地或战争，只改变国家协调与军事自主的力量关系。"
 minghm_policy.1300.t:0 "军制重整之议"
 minghm_policy.1300.desc:0 "军事自主既能补足短期国家能力，也可能形成独立权力。朝廷必须在统一指挥和既有军政协作之间选择重整方式。\n\n#V 执行能力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_capacity').GetValue|V0]#!\n#V 重整支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_support').GetValue|V0]#!\n#V 军政阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_resistance').GetValue|V0]#!"
 minghm_policy.1300.a:0 "确立统一训练与军令"
 minghm_policy.1300.a.tt:0 "支持与抵制都明显增加。"
 minghm_policy.1300.b:0 "先整合既有军政协作"
 minghm_policy.1300.b.tt:0 "执行能力上升，改革深度下降。"
 minghm_policy.1300.c:0 "暂缓重整"
 minghm_policy.1301.t:0 "军令的裁断"
 minghm_policy.1301.desc:0 "统一指挥需要约束，妥协能为重整留下协作空间；皇权强推可以更快实施，却会损害精英间的信任。"
 minghm_policy.1301.a:0 "接受协作条款，分步重整"
 minghm_policy.1301.a.tt:0 "支持增加、改革深度下降；两年后结算。"
 minghm_policy.1301.b:0 "耗费 25 皇权，强制统一军令"
 minghm_policy.1301.b.tt:0 "支持暂时增加，但抵制和精英分裂也会增加。"
 minghm_policy.1301.c:0 "撤回军制方案"
 minghm_policy.1302.t:0 "军制重整的结算"
 minghm_policy.1302.desc:0 "两年执行期结束。结果由国家协调、重整支持、军政阻力与有限随机决定；没有新军队、兵种、封地或战争被创建。"
 minghm_policy.1302.a:0 "军令重新获得协调"
 minghm_policy.1302.b:0 "取得有限整合"
 minghm_policy.1302.c:0 "军政自主反而增长"
 minghm_policy.1302.d:0 "重整引发新的军政失衡"
 minghm_launch_new_order_consolidation_decision:0 "@minghm_new_order!整合新秩序承诺"
 minghm_launch_new_order_consolidation_decision_desc:0 "在已经形成的新秩序承诺上，进行一次两年期整合。它不是胜利结局：失败会使承诺撤销，历史阶段重新回到力量竞争。"
 minghm_policy.1400.t:0 "@minghm_new_order!新秩序的整合之议"
 minghm_policy.1400.desc:0 "新的制度承诺必须落入既有国家协调与社会力量关系中。扩大联盟能获得更广基础；先行收束则更容易维持行政秩序。\n\n#V 整合支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_support').GetValue|V0]#!\n#V 整合能力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_capacity').GetValue|V0]#!\n#V 反弹阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_resistance').GetValue|V0]#!"
 minghm_policy.1400.a:0 "以更广联盟巩固承诺"
 minghm_policy.1400.a.tt:0 "支持与民众动员上升，反弹阻力也会增加。"
 minghm_policy.1400.b:0 "先用行政成例稳定秩序"
 minghm_policy.1400.b.tt:0 "整合能力上升，改革深度下降。"
 minghm_policy.1400.c:0 "暂缓整合"
 minghm_policy.1401.t:0 "承诺如何落地"
 minghm_policy.1401.desc:0 "新秩序必须决定是以妥协成例还是以皇权强制组织自身。前者更能保存协调，后者更快却会积累新的反弹。"
 minghm_policy.1401.a:0 "以协商成例推进"
 minghm_policy.1401.a.tt:0 "支持上升、改革深度下降；两年后结算。"
 minghm_policy.1401.b:0 "耗费 25 皇权，强制定制"
 minghm_policy.1401.b.tt:0 "支持暂时上升，但精英协调下降、阻力上升。"
 minghm_policy.1401.c:0 "停止整合"
 minghm_policy.1402.t:0 "@minghm_new_order!新秩序整合的结算"
 minghm_policy.1402.desc:0 "两年整合结束。成功会稳定国家协调；失败会撤销新秩序承诺，使历史阶段重新回到可逆的力量竞争。"
 minghm_policy.1402.a:0 "新秩序得以制度化"
 minghm_policy.1402.b:0 "以有限整合维持承诺"
 minghm_policy.1402.c:0 "承诺尚未克服内在矛盾"
 minghm_policy.1402.d:0 "整合失败，秩序重新失衡"
