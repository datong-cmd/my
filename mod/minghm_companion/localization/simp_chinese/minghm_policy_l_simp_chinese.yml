l_simp_chinese:
 minghm_launch_bureaucratic_reform_decision:0 "推行官僚考成重整"
 minghm_launch_bureaucratic_reform_decision_desc:0 "以全国力量对比推动一次两年期的考成重整。它不会改写科举、官职或品级，只会检验现有朝廷能否把诏令变为执行。"
 minghm_policy.1000.t:0 "考成重整之议"
 minghm_policy.1000.desc:0 "朝廷可以以公开廷议凝聚名分，也可以先协调执行链。现有内阁关系、朋党影响和八项全国力量已被折算进本次提案。\n\n#V 当前执行能力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_capacity').GetValue|V0]#!\n#V 当前朝堂支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_support').GetValue|V0]#!\n#V 当前既得利益阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_resistance').GetValue|V0]#!\n#V 当前改革深度：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_radicality').GetValue|V0]#!"
 minghm_policy.1000.a:0 "公开廷议，争取朝堂名分"
 minghm_policy.1000.a.tt:0 "支持增加，但公开反对也会被组织起来。"
 minghm_policy.1000.b:0 "先协调承办官署，降低改革深度"
 minghm_policy.1000.b.tt:0 "执行能力上升，改革深度下降。"
 minghm_policy.1000.c:0 "暂缓此议"
 minghm_policy.1000.c.tt:0 "不改变长期力量，解除本次前台锁。"
 minghm_policy.1001.t:0 "诏令的裁决"
 minghm_policy.1001.desc:0 "廷议已给出条件。妥协能换取较稳定的执行；强推可以迅速开局，却会留下精英分裂和抵制。\n\n#V 执行能力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_capacity').GetValue|V0]#!\n#V 朝堂支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_support').GetValue|V0]#!\n#V 既得利益阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_resistance').GetValue|V0]#!\n#V 改革深度：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_radicality').GetValue|V0]#!"
 minghm_policy.1001.a:0 "接受妥协条款，付诸执行"
 minghm_policy.1001.a.tt:0 "支持增加，改革深度下降；两年后按执行得分结算。"
 minghm_policy.1001.b:0 "耗费 25 皇权，强行颁行"
 minghm_policy.1001.b.tt:0 "支持暂时增加，但抵制和精英分裂也会增加。"
 minghm_policy.1001.c:0 "撤回诏令"
 minghm_policy.1001.c.tt:0 "解除本次前台锁，不改变长期力量。"
 minghm_policy.1002.t:0 "考成重整的结算"
 minghm_policy.1002.desc:0 "两年执行期结束。结果由事前锁定的执行能力、朝堂支持、既得利益阻力与有限随机共同决定。\n\n#V 执行得分：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_result').GetValue|V0]#!（执行能力 + 支持的一半 − 阻力 + 0—10 随机）"
 minghm_policy.1002.a:0 "承认新制已充分落实"
 minghm_policy.1002.a.tt:0 "国家能力和改革势头上升，守成力量下降。"
 minghm_policy.1002.b:0 "接受折衷落实"
 minghm_policy.1002.b.tt:0 "获得有限制度收益。"
 minghm_policy.1002.c:0 "承认纸面通过、执行走样"
 minghm_policy.1002.c.tt:0 "改革受挫，危机和守成力量上升。"
 minghm_policy.1002.d:0 "面对反噬，重整朝局"
 minghm_policy.1002.d.tt:0 "国家能力和改革势头下降，危机和守成力量上升。"
 minghm_launch_public_consultation_decision:0 "建立民生协商与动员程序"
 minghm_launch_public_consultation_decision_desc:0 "以两年期国家层协商试验组织既有民众动员、改革势头与朝廷能力。它不模拟人口、行业、市场或地方代表。"
 minghm_policy.1100.t:0 "民生协商之议"
 minghm_policy.1100.desc:0 "社会要求被纳入国家决策，既可能形成新的改革支持，也可能使对立更易组织。当前数值只表示全国力量关系，不代表任何具体群体或地区。\n\n#V 执行能力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_capacity').GetValue|V0]#!\n#V 动员支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_support').GetValue|V0]#!\n#V 守成阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_policy_resistance').GetValue|V0]#!"
 minghm_policy.1100.a:0 "设立公开陈情与朝议程序"
 minghm_policy.1100.a.tt:0 "支持增加，但守成阻力也会被公开组织。"
 minghm_policy.1100.b:0 "以有限请愿纳入既有程序"
 minghm_policy.1100.b.tt:0 "执行能力上升，改革深度下降，商业政治影响小幅上升。"
 minghm_policy.1100.c:0 "暂缓此议"
 minghm_policy.1101.t:0 "协商的边界"
 minghm_policy.1101.desc:0 "制度化协商可以收束冲突，也可以扩大参与。前者更容易执行；后者更能改变力量对比，亦会提高既得利益的抵制。"
 minghm_policy.1101.a:0 "限定议题，先确保可执行"
 minghm_policy.1101.a.tt:0 "支持增加，改革深度下降；两年后结算。"
 minghm_policy.1101.b:0 "扩大公开动员"
 minghm_policy.1101.b.tt:0 "要求民众动员至少 35；支持和民众动员上升，阻力也上升。"
 minghm_policy.1101.c:0 "停止筹备"
 minghm_policy.1102.t:0 "民生协商的结算"
 minghm_policy.1102.desc:0 "两年执行期结束。结果由国家执行能力、动员支持、守成阻力与有限随机共同决定；没有地区、人口或产出被单独计算。"
 minghm_policy.1102.a:0 "形成新的协商能力"
 minghm_policy.1102.b:0 "形成有限参与渠道"
 minghm_policy.1102.c:0 "程序被守成力量架空"
 minghm_policy.1102.d:0 "动员反噬为新的危机"
