l_simp_chinese:
 minghm_address_dual_power_decision:0 "处置双重权力危机"
 minghm_address_dual_power_decision_desc:0 "当民众动员、精英分裂与危机压力达到临界组合时，选择镇压、妥协或以新组织回应。该链是抽象政治对抗，不会生成派系、人物、战争或地区叛乱。"
 minghm_revolution.5000.t:0 "双重权力的临界点"
 minghm_revolution.5000.desc:0 "旧秩序的命令不再能单独组织社会。新的动员网络、军政自主和改革力量开始争夺实际支配权。\n\n#V 动员力量：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_revolution_force').GetValue|V0]#!\n#V 朝廷响应：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_revolution_response').GetValue|V0]#!\n#V 升级压力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_revolution_escalation').GetValue|V0]#!"
 minghm_revolution.5000.a:0 "召开约法会议，争取妥协"
 minghm_revolution.5000.a.tt:0 "降低动员与升级压力，提高朝廷响应，但承诺较低。"
 minghm_revolution.5000.b:0 "组织民生—革新联盟"
 minghm_revolution.5000.b.tt:0 "增强动员力量和承诺，也会提高升级压力。"
 minghm_revolution.5000.c:0 "以皇权整军重建秩序"
 minghm_revolution.5000.c.tt:0 "消耗 25 皇权，大幅提高朝廷响应，却提升升级压力和军事自主。"
 minghm_revolution.5000.d:0 "暂不处置"
 minghm_revolution.5010.t:0 "谁来组织新的权力"
 minghm_revolution.5010.desc:0 "第一轮选择之后，各方仍需决定是否将冲突公开化。公开的动员扩大社会基础；制度化的协商提高旧机构的整合能力；强制命令则会加速对抗。"
 minghm_revolution.5010.a:0 "公开动员并争取参与"
 minghm_revolution.5010.a.tt:0 "动员力量与民众动员上升。"
 minghm_revolution.5010.b:0 "以制度协议收束冲突"
 minghm_revolution.5010.b.tt:0 "动员力量下降，朝廷响应与精英协调上升。"
 minghm_revolution.5010.c:0 "下令强制恢复秩序"
 minghm_revolution.5010.c.tt:0 "仅限整军路线：朝廷响应上升，但升级压力和军事自主上升。"
 minghm_revolution.5020.t:0 "双重权力的结算"
 minghm_revolution.5020.desc:0 "两年的政治对抗已结束。结算来自朝廷响应、动员力量、升级压力、路线承诺及有限随机；它不会替代 CK3 的战争系统。"
 minghm_revolution.5020.a:0 "旧秩序暂时重建"
 minghm_revolution.5020.b:0 "以新约定整合秩序"
 minghm_revolution.5020.c:0 "双重权力延续"
 minghm_revolution.5020.d:0 "旧秩序发生断裂"
