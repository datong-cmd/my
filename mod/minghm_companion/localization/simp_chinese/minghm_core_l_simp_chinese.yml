l_simp_chinese:
 minghm_review_inherited_agenda_decision:0 "复核前朝未决事项"
 minghm_review_inherited_agenda_decision_desc:0 "前任留下了一项尚未完成的政治行动。先复核其状态，再决定续办或封存，避免旧事件上下文影响新君。"
 minghm_core.0003.t:0 "前朝未决事项"
 minghm_core.0003.desc:0 "新君继承的不只是头衔，也包括已经启动的制度行动。长期项目可以续办；短期案件和危机应安全封存后重新处置。"
 minghm_core.0003.a:0 "按原定方向续办"
 minghm_core.0003.a.tt:0 "仅政策、技术项目与双重权力危机可以续办；恢复其季度推进。"
 minghm_core.0003.b:0 "封存旧案，另行裁断"
 minghm_core.0003.b.tt:0 "解除前台锁，国家能力 -1、危机压力 +2。"
 minghm_abandon_active_agenda_decision:0 "撤回当前政治行动"
 minghm_abandon_active_agenda_decision_desc:0 "中止当前政策、项目或危机处置，释放唯一前台槽。中止不会改变《变身大明》的官位、朋党、特质或皇权数据。"
 minghm_core.0004.t:0 "撤回当前行动"
 minghm_core.0004.desc:0 "继续推进已不再符合当前力量关系。可以付出有限的行政信誉与危机代价，安全封存本模组当前行动。"
 minghm_core.0004.a:0 "确认撤回并封存"
 minghm_core.0004.a.tt:0 "国家能力 -1、危机压力 +2，清除本模组当前前台槽。"
 minghm_core.0004.b:0 "继续当前行动"
 minghm_core.0005.t:0 "大明的历史阶段发生变迁"
 minghm_core.0005.desc:0 "阶段来自国家能力、改革势头、守成力量、民众动员、精英协调、军事自主、承办影响与危机压力的组合，并经连续两年确认。它不是按年份自动升级，也可以倒退。"
 minghm_core.0005.a:0 "秩序暂时稳固"
 minghm_core.0005.b:0 "秩序失衡"
 minghm_core.0005.c:0 "改革竞争加剧"
 minghm_core.0005.d:0 "双重权力形成"
 minghm_core.0005.e:0 "新秩序进入整合"
 minghm_set_new_reign_direction_decision:0 "定立新君朝局方针"
 minghm_set_new_reign_direction_decision_desc:0 "新君取得大明后，选择首次统治的组织方向。它只调整国家层力量，既不改变前置模组的官位和皇权，也不为人物添加意识形态标签。"
 minghm_core.0006.t:0 "新君的朝局方针"
 minghm_core.0006.desc:0 "继承并不自动决定统治方向。皇权裁断、官僚协调与民生动员各自依托不同力量，也会留下不同矛盾。"
 minghm_core.0006.a:0 "以皇权裁断重整朝局"
 minghm_core.0006.a.tt:0 "国家能力 +2、守成力量 +2、精英协调 -1。"
 minghm_core.0006.b:0 "以官僚协调开创新局"
 minghm_core.0006.b.tt:0 "国家能力 +1、改革势头 +3、精英协调 +2。"
 minghm_core.0006.c:0 "以民生动员争取新基础"
 minghm_core.0006.c.tt:0 "改革势头 +2、民众动员 +3、危机压力 +1。"
