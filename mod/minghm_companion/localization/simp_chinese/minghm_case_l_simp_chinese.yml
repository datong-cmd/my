l_simp_chinese:
 minghm_open_procedural_case_decision:0 "启动程序性案件"
 minghm_open_procedural_case_decision_desc:0 "依托已经在廷的大理寺或锦衣卫，处理一次抽象的权力案件。不会创建被告、办案人、派系或地方对象。"
 minghm_case.4000.t:0 "一桩程序性案件"
 minghm_case.4000.desc:0 "朝廷中的矛盾已经积累为必须裁断的案件。证据、程序、政治压力与恐惧将共同决定它是巩固国家能力，还是成为新的权力裂缝。\n\n#V 初始证据：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_case_evidence').GetValue|V0]#!\n#V 政治压力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_case_pressure').GetValue|V0]#!"
 minghm_case.4000.a:0 "交由大理寺循程序审理"
 minghm_case.4000.a.tt:0 "提高程序与证据，但给既有力量留下协调空间。"
 minghm_case.4000.b:0 "令锦衣卫先行侦缉"
 minghm_case.4000.b.tt:0 "迅速提高证据，却加剧压力与政治恐惧。"
 minghm_case.4000.c:0 "暂缓立案"
 minghm_case.4000.c.tt:0 "解除案件槽，不改变长期力量。"
 minghm_case.4001.t:0 "证据与裁断"
 minghm_case.4001.desc:0 "案件的第一步已使矛盾可见。继续补足文书与申辩能让结果更可被各方接受；加速定案能争取眼前主动，却会扩大恐惧。"
 minghm_case.4001.a:0 "补全证据与复核"
 minghm_case.4001.a.tt:0 "增加证据和程序保障。"
 minghm_case.4001.b:0 "迅速作出政治裁断"
 minghm_case.4001.b.tt:0 "增加证据，但提高压力与恐惧。"
 minghm_case.4002.t:0 "案件的政治后果"
 minghm_case.4002.desc:0 "案件结案。结果只由已公开投入的证据、程序、压力、恐惧和有限随机组成，不把一次案件模拟成完整的司法系统。"
 minghm_case.4002.a:0 "程序巩固了朝廷"
 minghm_case.4002.b:0 "以有限成果收束"
 minghm_case.4002.c:0 "裁断留下新的裂缝"
 minghm_case.4002.d:0 "案件演成权力危机"
