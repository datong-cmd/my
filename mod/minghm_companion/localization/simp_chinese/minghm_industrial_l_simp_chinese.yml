l_simp_chinese:
 minghm_start_technical_network_decision:0 "设立技术译审与试制网络"
 minghm_start_technical_network_decision_desc:0 "开启再工业化路线的第一阶段：以现有朝廷和承办组织持续组织技术、人才与标准，而非建立生产或市场沙盘。"
 minghm_industrial.3000.t:0 "译审与试制网络"
 minghm_industrial.3000.desc:0 "零散技艺无法改变国家能力。问题不在于创造一座工厂，而在于是否能让知识、试制与官署协调形成稳定组织。"
 minghm_industrial.3000.a:0 "以官署译审与试制为主"
 minghm_industrial.3000.b:0 "允许承办网络参与协作"
 minghm_industrial.3000.c:0 "暂缓此议"
 minghm_continue_technical_organization_decision:0 "推进技术组织革新"
 minghm_continue_technical_organization_decision_desc:0 "在已有译审与试制网络上，开展一项两年的组织革新。项目只处理知识、标准、训练与政治承诺，不建立经济沙盘。"
 minghm_industrial.3010.t:0 "技术组织的正当性"
 minghm_industrial.3010.desc:0 "试制网络需要一套能持续调动人力和官署的公共理由。皇权、经世官僚与民生动员会产生不同支持，也锁定不同代价。\n\n#V 组织支持：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_technical_support').GetValue|V0]#!\n#V 组织阻力：[ROOT.Char.GetPrimaryTitle.MakeScope.Var('minghm_technical_resistance').GetValue|V0]#!"
 minghm_industrial.3010.a:0 "以皇权与祖制担保"
 minghm_industrial.3010.a.tt:0 "消耗 25 皇权，承诺较高，但也会激起较强抵制。"
 minghm_industrial.3010.b:0 "以经世与官僚责任说明"
 minghm_industrial.3010.b.tt:0 "承诺较低，换取较小的协调阻力。"
 minghm_industrial.3010.c:0 "以民生与参与动员"
 minghm_industrial.3010.c.tt:0 "提高民众动员，却会扩大政治争议。"
 minghm_industrial.3010.d:0 "暂不展开项目"
 minghm_industrial.3020.t:0 "试院的工作方向"
 minghm_industrial.3020.desc:0 "知识组织不是中立工具。度量、训练与译制传播各自建立不同的权力联系，也会将不同群体带入国家协调。"
 minghm_industrial.3020.a:0 "推行标准度量与成例"
 minghm_industrial.3020.a.tt:0 "支持增加较多，抵制小幅上升。"
 minghm_industrial.3020.b:0 "侧重军器操练与训练"
 minghm_industrial.3020.b.tt:0 "军事自主小幅上升，组织阻力较高。"
 minghm_industrial.3020.c:0 "侧重译制与知识传播"
 minghm_industrial.3020.c.tt:0 "商业影响小幅上升，支持与阻力均温和变化。"
 minghm_industrial.3020.d:0 "停止筹备"
 minghm_industrial.3030.t:0 "技术组织项目结算"
 minghm_industrial.3030.desc:0 "两年的组织项目告一段落。结算由公开的支持、承诺、阻力和有限随机构成；成功只使技术组织阶段上升一档，不代表建立工厂或获得产能。"
 minghm_industrial.3030.a:0 "试院制度化成功"
 minghm_industrial.3030.b:0 "形成有限成例"
 minghm_industrial.3030.c:0 "部门争权吞没项目"
 minghm_industrial.3030.d:0 "项目仪式化失败"
