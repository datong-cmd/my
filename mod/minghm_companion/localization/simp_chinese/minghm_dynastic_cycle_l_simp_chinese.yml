l_simp_chinese:
 situation_minghm_dynastic_cycle:0 "大明政局循环"
 situation_minghm_dynastic_cycle_desc:0 "以国家组织能力、阶级力量与危机压力共同决定的大明政局阶段。它不模拟市场、财政、人口或世界范围的王朝循环。"
 minghm_dynastic_cycle_sub_region_greatming:0 "大明制度空间"
 minghm_dynastic_cycle_participant_group_minghm_emperor:0 "皇帝"
 minghm_dynastic_cycle_participant_group_minghm_grand_secretariat:0 "现任大学士"
 minghm_dynastic_cycle_phase_consolidation_situation_phase:0 "秩序整合"
 minghm_dynastic_cycle_phase_consolidation_situation_phase_desc:0 "国家能力与精英协调暂时压过危机压力，既有制度仍可运行。"
 minghm_dynastic_cycle_phase_strain_situation_phase:0 "制度失衡"
 minghm_dynastic_cycle_phase_strain_situation_phase_desc:0 "危机与守成阻力积累，旧制度尚未瓦解但执行出现裂缝。"
 minghm_dynastic_cycle_phase_reform_situation_phase:0 "改革竞争"
 minghm_dynastic_cycle_phase_reform_situation_phase_desc:0 "改革组织、动员方式与既有力量争夺制度方向；没有任何一方必然获胜。"
 minghm_dynastic_cycle_phase_dual_power_situation_phase:0 "双重权力"
 minghm_dynastic_cycle_phase_dual_power_situation_phase_desc:0 "国家整合下降而组织力量上升，多种政治正当性同时争夺实际执行权。"
 minghm_dynastic_cycle_phase_new_order_situation_phase:0 "新秩序整合"
 minghm_dynastic_cycle_phase_new_order_situation_phase_desc:0 "新的组织承诺已形成，但仍须在危机反复中证明其能够整合国家。"
